<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DeepSeek 聊天助手 - 带记忆</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background-color: #f4f7f9;
            margin: 0;
            padding: 20px;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            max-width: 800px;
            width: 100%;
            height: 85vh;
            background-color: white;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .settings-area {
            padding: 15px;
            background-color: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        #apiKeyInput {
            flex: 2;
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 30px;
            font-size: 14px;
            outline: none;
        }
        #apiKeyInput:focus { border-color: #0f172a; }
        #saveKeyBtn, #clearChatBtn {
            background-color: #0f172a;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        #clearChatBtn { background-color: #475569; }
        #saveKeyBtn:active, #clearChatBtn:active { transform: scale(0.96); }
        .messages-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message { display: flex; flex-direction: column; max-width: 85%; }
        .user-message { align-items: flex-end; align-self: flex-end; }
        .assistant-message { align-items: flex-start; align-self: flex-start; }
        .bubble {
            padding: 12px 18px;
            border-radius: 24px;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        .user-message .bubble { background-color: #0f172a; color: white; border-bottom-right-radius: 4px; }
        .assistant-message .bubble { background-color: #f1f5f9; color: #0f172a; border-bottom-left-radius: 4px; }
        .timestamp { font-size: 11px; color: #94a3b8; margin-top: 5px; margin-left: 12px; margin-right: 12px; }
        .input-area {
            padding: 15px;
            background-color: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
        }
        #userInput {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            font-size: 16px;
            outline: none;
            resize: none;
            font-family: inherit;
        }
        #sendBtn {
            background-color: #0f172a;
            color: white;
            border: none;
            width: 50px;
            border-radius: 40px;
            font-size: 20px;
            cursor: pointer;
        }
        #sendBtn:disabled, #saveKeyBtn:disabled, #clearChatBtn:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }
        .loading { color: #64748b; font-style: italic; padding: 10px; }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="settings-area">
        <input type="password" id="apiKeyInput" placeholder="粘贴你的 DeepSeek API Key (sk-...)" autocomplete="off">
        <button id="saveKeyBtn">保存 Key</button>
        <button id="clearChatBtn">🗑️ 新对话</button>
    </div>
    <div class="messages-area" id="messagesArea"></div>
    <div class="input-area">
        <textarea id="userInput" rows="1" placeholder="输入你的问题... (Shift+Enter 换行, Enter 发送)"></textarea>
        <button id="sendBtn">➤</button>
    </div>
</div>

<script>
    // --- 获取元素 ---
    const apiKeyInput = document.getElementById('apiKeyInput');
    const saveKeyBtn = document.getElementById('saveKeyBtn');
    const clearChatBtn = document.getElementById('clearChatBtn');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const messagesArea = document.getElementById('messagesArea');

    let currentApiKey = '';
    let conversationHistory = [];  // 存储对话历史 {role, content}

    // 添加消息到界面，并可选择是否存入历史
    function addMessage(role, content, saveToHistory = true) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role}-message`;
        const bubbleDiv = document.createElement('div');
        bubbleDiv.className = 'bubble';
        bubbleDiv.innerText = content;
        const timeDiv = document.createElement('div');
        timeDiv.className = 'timestamp';
        timeDiv.innerText = new Date().toLocaleTimeString([], { hour: '2-digit', minute:'2-digit' });
        messageDiv.appendChild(bubbleDiv);
        messageDiv.appendChild(timeDiv);
        messagesArea.appendChild(messageDiv);
        messagesArea.scrollTop = messagesArea.scrollHeight;
        if (saveToHistory) {
            conversationHistory.push({ role: role, content: content });
        }
    }

    function showTypingIndicator() {
        const div = document.createElement('div');
        div.id = 'typingIndicator';
        div.className = 'message assistant-message';
        div.innerHTML = '<div class="bubble loading">思考中...</div>';
        messagesArea.appendChild(div);
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }
    function removeTypingIndicator() {
        const el = document.getElementById('typingIndicator');
        if (el) el.remove();
    }

    async function callDeepSeekAPI(userQuestion) {
        if (!currentApiKey) {
            addMessage('assistant', '❌ 请先保存 API Key。', false);
            return;
        }
        addMessage('user', userQuestion, true);
        userInput.value = '';
        showTypingIndicator();
        sendBtn.disabled = true;
        saveKeyBtn.disabled = true;
        clearChatBtn.disabled = true;

        // 构建消息：系统提示 + 完整历史
        const messagesForAPI = [
            { role: 'system', content: '你是一个乐于助人的AI助手，请用中文回答问题。请记住我们之前的对话内容。' }
        ].concat(conversationHistory);

        try {
            const response = await fetch('https://api.deepseek.com/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${currentApiKey}`
                },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: messagesForAPI,
                    stream: false
                })
            });
            removeTypingIndicator();
            if (!response.ok) {
                let errMsg = `HTTP ${response.status}`;
                try { const errData = await response.json(); errMsg = errData.error?.message || JSON.stringify(errData); } catch(e) {}
                throw new Error(errMsg);
            }
            const data = await response.json();
            const reply = data.choices[0].message.content;
            addMessage('assistant', reply, true);
        } catch (error) {
            removeTypingIndicator();
            addMessage('assistant', `😵 出错: ${error.message}`, false);
            conversationHistory.pop(); // 移除刚才添加的用户消息
        } finally {
            sendBtn.disabled = false;
            saveKeyBtn.disabled = false;
            clearChatBtn.disabled = false;
            userInput.focus();
        }
    }

    function saveApiKey() {
        const key = apiKeyInput.value.trim();
        if (key && key.startsWith('sk-')) {
            currentApiKey = key;
            localStorage.setItem('deepseek_api_key', key);
            addMessage('assistant', '✅ API Key 已保存，现在可以对话了！', false);
            apiKeyInput.value = '';
        } else {
            alert('请输入以 sk- 开头的有效 API Key');
        }
    }

    function newConversation() {
        conversationHistory = [];
        messagesArea.innerHTML = '';
        addMessage('assistant', '✨ 新对话已开始！我会忘记之前聊过的内容。', false);
    }

    function loadSavedKey() {
        const saved = localStorage.getItem('deepseek_api_key');
        if (saved && saved.startsWith('sk-')) {
            currentApiKey = saved;
            addMessage('assistant', '🔑 已自动加载 API Key，现在可以聊天了！', false);
        } else {
            addMessage('assistant', '请先粘贴你的 DeepSeek API Key 并点击保存。', false);
        }
    }

    // 绑定事件
    saveKeyBtn.addEventListener('click', saveApiKey);
    clearChatBtn.addEventListener('click', newConversation);
    sendBtn.addEventListener('click', () => {
        const q = userInput.value.trim();
        if (q) callDeepSeekAPI(q);
    });
    userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            const q = userInput.value.trim();
            if (q) callDeepSeekAPI(q);
        }
    });

    loadSavedKey();
    userInput.focus();
</script>
</body>
</html>
