<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DeepSeek 聊天助手 - 永久记忆</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background-color: #f4f7f9;
            margin: 0;
            padding: 20px;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            max-width: 800px;
            width: 100%;
            height: 85vh;
            background-color: white;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .settings-area {
            padding: 15px;
            background-color: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        #apiKeyInput {
            flex: 2;
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 30px;
            font-size: 14px;
            outline: none;
        }
        #apiKeyInput:focus {
            border-color: #0f172a;
        }
        #saveKeyBtn, #clearChatBtn {
            background-color: #0f172a;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        #clearChatBtn {
            background-color: #475569;
        }
        #saveKeyBtn:active, #clearChatBtn:active {
            transform: scale(0.96);
        }
        .messages-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }
        .user-message {
            align-items: flex-end;
            align-self: flex-end;
        }
        .assistant-message {
            align-items: flex-start;
            align-self: flex-start;
        }
        .bubble {
            padding: 12px 18px;
            border-radius: 24px;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        .user-message .bubble {
            background-color: #0f172a;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .assistant-message .bubble {
            background-color: #f1f5f9;
            color: #0f172a;
            border-bottom-left-radius: 4px;
        }
        .timestamp {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 5px;
            margin-left: 12px;
            margin-right: 12px;
        }
        .input-area {
            padding: 15px;
            background-color: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
        }
        #userInput {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            font-size: 16px;
            outline: none;
            resize: none;
            font-family: inherit;
        }
        #sendBtn, #regenerateBtn {
            background-color: #0f172a;
            color: white;
            border: none;
            width: 50px;
            border-radius: 40px;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        #regenerateBtn {
            background-color: #64748b;
            width: auto;
            padding: 0 16px;
            font-size: 14px;
        }
        #sendBtn:disabled, #saveKeyBtn:disabled, #clearChatBtn:disabled, #regenerateBtn:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
            transform: none;
        }
        .loading {
            color: #64748b;
            font-style: italic;
            padding: 10px;
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="settings-area">
        <input type="password" id="apiKeyInput" placeholder="粘贴你的 DeepSeek API Key (sk-...)" autocomplete="off">
        <button id="saveKeyBtn">保存 Key</button>
        <button id="clearChatBtn">🗑️ 新对话</button>
    </div>
    <div class="messages-area" id="messagesArea"></div>
    <div class="input-area">
        <textarea id="userInput" rows="1" placeholder="输入消息..."></textarea>
        <button id="sendBtn">➤</button>
        <button id="regenerateBtn">🔄 重新生成</button>
    </div>
</div>

<script>
    // --- DOM 元素 ---
    const apiKeyInput = document.getElementById('apiKeyInput');
    const saveKeyBtn = document.getElementById('saveKeyBtn');
    const clearChatBtn = document.getElementById('clearChatBtn');
    const regenerateBtn = document.getElementById('regenerateBtn');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const messagesArea = document.getElementById('messagesArea');

    let currentApiKey = '';
    let conversationHistory = [];  // 存储 {role, content, timestamp}

    // ========== 持久化存储函数 ==========
    const STORAGE_KEY_HISTORY = 'deepseek_chat_history';
    const STORAGE_KEY_API = 'deepseek_api_key';

    // 保存历史到 localStorage
    function saveHistoryToLocalStorage() {
        try {
            localStorage.setItem(STORAGE_KEY_HISTORY, JSON.stringify(conversationHistory));
        } catch(e) {
            console.warn('保存历史失败', e);
        }
    }

    // 从 localStorage 加载历史
    function loadHistoryFromLocalStorage() {
        const saved = localStorage.getItem(STORAGE_KEY_HISTORY);
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                if (Array.isArray(parsed)) {
                    conversationHistory = parsed;
                }
            } catch(e) {
                console.warn('解析历史失败', e);
                conversationHistory = [];
            }
        } else {
            conversationHistory = [];
        }
    }

    // 渲染整个聊天界面（根据 conversationHistory）
    function renderAllMessages() {
        messagesArea.innerHTML = '';
        for (const msg of conversationHistory) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${msg.role}-message`;
            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'bubble';
            bubbleDiv.innerText = msg.content;
            const timeDiv = document.createElement('div');
            timeDiv.className = 'timestamp';
            // 使用存储的时间戳，如果没有则用当前时间
            let timeStr = msg.timestamp || new Date().toLocaleTimeString([], { hour: '2-digit', minute:'2-digit' });
            timeDiv.innerText = timeStr;
            messageDiv.appendChild(bubbleDiv);
            messageDiv.appendChild(timeDiv);
            messagesArea.appendChild(messageDiv);
        }
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    // 添加消息到界面和历史（不重复渲染全部，只追加）
    function addMessage(role, content, saveToHistory = true, customTime = null) {
        const timestamp = customTime || new Date().toLocaleTimeString([], { hour: '2-digit', minute:'2-digit' });
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role}-message`;
        const bubbleDiv = document.createElement('div');
        bubbleDiv.className = 'bubble';
        bubbleDiv.innerText = content;
        const timeDiv = document.createElement('div');
        timeDiv.className = 'timestamp';
        timeDiv.innerText = timestamp;
        messageDiv.appendChild(bubbleDiv);
        messageDiv.appendChild(timeDiv);
        messagesArea.appendChild(messageDiv);
        messagesArea.scrollTop = messagesArea.scrollHeight;
        
        if (saveToHistory) {
            conversationHistory.push({ role: role, content: content, timestamp: timestamp });
            saveHistoryToLocalStorage();
        }
    }

    function showTypingIndicator() {
        const div = document.createElement('div');
        div.id = 'typingIndicator';
        div.className = 'message assistant-message';
        div.innerHTML = '<div class="bubble loading">思考中...</div>';
        messagesArea.appendChild(div);
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function removeTypingIndicator() {
        const el = document.getElementById('typingIndicator');
        if (el) el.remove();
    }

    function disableButtons(disabled) {
        sendBtn.disabled = disabled;
        saveKeyBtn.disabled = disabled;
        clearChatBtn.disabled = disabled;
        regenerateBtn.disabled = disabled;
    }

    // --- 核心 API 调用（发送消息）---
    async function callDeepSeekAPI(userQuestion) {
        if (!currentApiKey) {
            addMessage('assistant', '❌ 请先保存 API Key。', false);
            return;
        }
        // 显示用户消息并存入历史
        addMessage('user', userQuestion, true);
        userInput.value = '';
        showTypingIndicator();
        disableButtons(true);

        const messagesForAPI = [
            { role: 'system', content: '你是一个乐于助人的AI助手，请用中文回答问题。请记住我们之前的对话内容。' }
        ].concat(conversationHistory.map(m => ({ role: m.role, content: m.content }))); // 只取内容和角色，不带时间戳

        try {
            const response = await fetch('https://api.deepseek.com/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${currentApiKey}`
                },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: messagesForAPI,
                    stream: false
                })
            });
            removeTypingIndicator();
            if (!response.ok) {
                let errMsg = `HTTP ${response.status}`;
                try {
                    const errData = await response.json();
                    errMsg = errData.error?.message || JSON.stringify(errData);
                } catch(e) {}
                throw new Error(errMsg);
            }
            const data = await response.json();
            const reply = data.choices[0].message.content;
            addMessage('assistant', reply, true);
        } catch (error) {
            removeTypingIndicator();
            addMessage('assistant', `😵 出错: ${error.message}`, false);
            // 出错时移除刚才添加的用户消息
            conversationHistory.pop();
            saveHistoryToLocalStorage();
            // 删除界面上的最后一条用户消息
            const userMessages = document.querySelectorAll('.user-message');
            if (userMessages.length > 0) userMessages[userMessages.length-1].remove();
        } finally {
            disableButtons(false);
            userInput.focus();
        }
    }

    // --- 重新生成最后一条 AI 回复（同时更新存储）---
    async function regenerateLastReply() {
        if (!currentApiKey) {
            addMessage('assistant', '❌ 请先保存 API Key。', false);
            return;
        }
        if (conversationHistory.length < 2) {
            addMessage('assistant', '没有可以重新生成的消息（至少需要一轮对话）。', false);
            return;
        }
        const lastMsg = conversationHistory[conversationHistory.length - 1];
        if (lastMsg.role !== 'assistant') {
            addMessage('assistant', '无法重新生成：最后一条不是AI回复。', false);
            return;
        }
        // 移除最后一条 assistant 回复（历史中）
        conversationHistory.pop();
        saveHistoryToLocalStorage();
        // 移除界面上的最后一条 AI 消息
        const allAssistantMsgs = document.querySelectorAll('.assistant-message');
        if (allAssistantMsgs.length > 0) {
            allAssistantMsgs[allAssistantMsgs.length-1].remove();
        }

        const lastUserQuestion = conversationHistory[conversationHistory.length-1].content;
        showTypingIndicator();
        disableButtons(true);

        const messagesForAPI = [
            { role: 'system', content: '你是一个乐于助人的AI助手，请用中文回答问题。请记住我们之前的对话内容。' }
        ].concat(conversationHistory.map(m => ({ role: m.role, content: m.content })));

        try {
            const response = await fetch('https://api.deepseek.com/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${currentApiKey}`
                },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: messagesForAPI,
                    stream: false
                })
            });
            removeTypingIndicator();
            if (!response.ok) {
                let errMsg = `HTTP ${response.status}`;
                try {
                    const errData = await response.json();
                    errMsg = errData.error?.message || JSON.stringify(errData);
                } catch(e) {}
                throw new Error(errMsg);
            }
            const data = await response.json();
            const newReply = data.choices[0].message.content;
            addMessage('assistant', newReply, true);
        } catch (error) {
            removeTypingIndicator();
            addMessage('assistant', `😵 重新生成失败: ${error.message}`, false);
        } finally {
            disableButtons(false);
            userInput.focus();
        }
    }

    // --- 保存 API Key ---
    function saveApiKey() {
        const key = apiKeyInput.value.trim();
        if (key && key.startsWith('sk-')) {
            currentApiKey = key;
            localStorage.setItem(STORAGE_KEY_API, key);
            addMessage('assistant', '✅ API Key 已保存，现在可以对话了！', false);
            apiKeyInput.value = '';
        } else {
            alert('请输入以 sk- 开头的有效 API Key');
        }
    }

    // --- 新对话：清空历史和存储，重新开始 ---
    function newConversation() {
        conversationHistory = [];
        saveHistoryToLocalStorage();
        messagesArea.innerHTML = '';
        addMessage('assistant', '✨ 新对话已开始！之前的记录已清空。', false);
    }

    // --- 加载 API Key 和历史 ---
    function loadSavedData() {
        // 加载 API Key
        const savedKey = localStorage.getItem(STORAGE_KEY_API);
        if (savedKey && savedKey.startsWith('sk-')) {
            currentApiKey = savedKey;
        }
        // 加载历史记录
        loadHistoryFromLocalStorage();
        if (conversationHistory.length === 0) {
            // 没有历史，显示欢迎消息（不保存到历史）
            addMessage('assistant', '🔑 欢迎回来！我可以记住我们所有的对话，除非你点击“新对话”。开始聊天吧！', false);
        } else {
            // 有历史，直接渲染
            renderAllMessages();
        }
        // 如果已保存 API Key，在界面提示（但不需要重复显示欢迎）
        if (currentApiKey) {
            // 可以悄悄加载，不打扰
        } else {
            addMessage('assistant', '请先粘贴你的 DeepSeek API Key 并点击保存。', false);
        }
    }

    // --- 事件绑定 ---
    saveKeyBtn.addEventListener('click', saveApiKey);
    clearChatBtn.addEventListener('click', newConversation);
    regenerateBtn.addEventListener('click', regenerateLastReply);
    sendBtn.addEventListener('click', () => {
        const q = userInput.value.trim();
        if (q) callDeepSeekAPI(q);
    });
    userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            const q = userInput.value.trim();
            if (q) callDeepSeekAPI(q);
        }
    });

    // --- 初始化 ---
    loadSavedData();
    userInput.focus();
</script>
</body>
</html>
