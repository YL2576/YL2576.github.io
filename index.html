<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>DeepSeek-V4 · 专家模式内嵌</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background-color: #f4f7f9;
            margin: 0;
            padding: 20px;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            max-width: 800px;
            width: 100%;
            height: 90vh;
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 28px -6px rgba(0,0,0,0.12);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        /* 顶部控制栏 */
        .settings-area {
            background: #f8fafc;
            padding: 12px 16px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            flex-shrink: 0;
        }
        .api-row {
            display: flex;
            flex: 2;
            min-width: 200px;
            gap: 8px;
        }
        #apiKeyInput {
            flex: 1;
            padding: 8px 14px;
            border-radius: 40px;
            border: 1px solid #cbd5e1;
            background: white;
            font-size: 13px;
            outline: none;
        }
        .btn-sm {
            background: #0f172a;
            color: white;
            border: none;
            padding: 0 18px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
            white-space: nowrap;
        }
        .btn-sm:active { transform: scale(0.96); }
        /* 专家模式按钮组 */
        .expert-buttons {
            display: flex;
            gap: 8px;
            align-items: center;
            background: #eef2ff;
            padding: 4px 12px;
            border-radius: 48px;
        }
        .expert-btn {
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 32px;
            padding: 5px 14px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .expert-btn.active {
            background: #0f172a;
            color: white;
            border-color: #0f172a;
        }
        .expert-btn.reset {
            background: #f1f5f9;
            color: #475569;
        }
        .control-group {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: white;
            padding: 4px 12px;
            border-radius: 40px;
            border: 1px solid #e2e8f0;
        }
        select, .temp-slider {
            background: white;
            border: none;
            font-size: 12px;
            cursor: pointer;
        }
        .temp-value { min-width: 38px; text-align: center; font-weight: 600; }
        /* 消息区域 */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }
        .user-message { align-items: flex-end; align-self: flex-end; }
        .assistant-message { align-items: flex-start; align-self: flex-start; }
        .bubble {
            padding: 12px 18px;
            border-radius: 24px;
            line-height: 1.45;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .user-message .bubble {
            background: #0f172a;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .assistant-message .bubble {
            background: #f1f5f9;
            color: #0f172a;
            border-bottom-left-radius: 4px;
        }
        .reasoning-block {
            margin-bottom: 12px;
            background: #fef9e3;
            border-left: 4px solid #f59e0b;
            border-radius: 18px;
            padding: 10px 14px;
            font-size: 0.85rem;
            color: #78350f;
        }
        .reasoning-header {
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            user-select: none;
        }
        .reasoning-content {
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 0.85rem;
            line-height: 1.4;
        }
        .timestamp {
            font-size: 10px;
            color: #94a3b8;
            margin-top: 5px;
            margin-left: 12px;
            margin-right: 12px;
        }
        .input-area {
            background: white;
            border-top: 1px solid #e2e8f0;
            padding: 14px 16px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        #userInput {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            outline: none;
        }
        .button-group {
            display: flex;
            gap: 8px;
        }
        .icon-btn {
            background: #0f172a;
            border: none;
            color: white;
            width: 48px;
            border-radius: 40px;
            font-size: 1.3rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .icon-btn.special { background: #475569; width: auto; padding: 0 18px; font-size: 0.9rem; }
        .icon-btn.warning { background: #b91c1c; }
        .icon-btn:disabled { background: #94a3b8; cursor: not-allowed; transform: none; }
        .mode-badge {
            background: #e2e8f0;
            border-radius: 16px;
            padding: 2px 10px;
            font-size: 11px;
            font-weight: 500;
            margin-left: 8px;
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="settings-area">
        <div class="api-row">
            <input type="password" id="apiKeyInput" placeholder="DeepSeek API Key (sk-...)" autocomplete="off">
            <button id="saveKeyBtn" class="btn-sm">保存 Key</button>
        </div>
        <div class="expert-buttons">
            <button id="roleplayModeBtn" class="expert-btn">🎭 角色沉浸</button>
            <button id="analysisModeBtn" class="expert-btn">📐 纯分析</button>
            <button id="normalModeBtn" class="expert-btn reset">✖️ 关闭专家模式</button>
        </div>
        <div class="control-group">
            <span>⚙️</span>
            <select id="modelSelect">
                <option value="deepseek-v4-flash">🚀 V4-Flash (经济/快速)</option>
                <option value="deepseek-v4-pro">🔥 V4-Pro (旗舰/深度推理)</option>
            </select>
        </div>
        <div class="control-group">
            <span>🌡️</span>
            <input type="range" id="tempSlider" class="temp-slider" min="0" max="2" step="0.05" value="1.3">
            <span id="tempValue" class="temp-value">1.30</span>
        </div>
        <button id="clearChatBtn" class="btn-sm">🗑️ 新对话</button>
    </div>
    <div class="messages-area" id="messagesArea"></div>
    <div class="input-area">
        <textarea id="userInput" rows="1" placeholder="输入对话 (Enter发送)"></textarea>
        <div class="button-group">
            <button id="sendBtn" class="icon-btn">➤</button>
            <button id="undoBtn" class="icon-btn warning" title="撤回上一条">↩️</button>
            <button id="regenerateBtn" class="icon-btn special">🔄 重答</button>
        </div>
    </div>
</div>

<script>
    // ---------- DOM 元素 ----------
    const apiKeyInput = document.getElementById('apiKeyInput');
    const saveKeyBtn = document.getElementById('saveKeyBtn');
    const clearChatBtn = document.getElementById('clearChatBtn');
    const regenerateBtn = document.getElementById('regenerateBtn');
    const undoBtn = document.getElementById('undoBtn');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const messagesArea = document.getElementById('messagesArea');
    const modelSelect = document.getElementById('modelSelect');
    const tempSlider = document.getElementById('tempSlider');
    const tempValue = document.getElementById('tempValue');
    const roleplayBtn = document.getElementById('roleplayModeBtn');
    const analysisBtn = document.getElementById('analysisModeBtn');
    const normalBtn = document.getElementById('normalModeBtn');

    let currentApiKey = '';
    let conversationHistory = [];
    let currentTemperature = 1.3;
    let currentModel = 'deepseek-v4-flash';
    let expertMode = null;   // 'roleplay' 或 'analysis'，null表示普通

    // 专家模式对应的完整指令文本（来自官方仓库）
    const ROLEPLAY_INSTRUCTION = "〖角色沉浸要求〗你需要完全进入角色，以第一人称视角思考，用括号()或【】表示内心戏或动作细节，展现真实的情绪波动，不允许出现分析性语言。";
    const ANALYSIS_INSTRUCTION = "〖思维模式要求〗你不需要进行角色内心戏。取而代之，你需要在括号中用冷静、客观的语言进行纯分析：规划剧情走向、拆解用户意图、设计符合角色设定的回应策略。禁止使用第一人称内心独白。";

    // 存储键名
    const STORAGE_KEY_HISTORY = 'deepseek_v4_expert_history';
    const STORAGE_KEY_API = 'deepseek_api_key_v4';
    const STORAGE_KEY_MODEL = 'deepseek_v4_model';
    const STORAGE_KEY_TEMP = 'deepseek_v4_temp';
    const STORAGE_KEY_EXPERT = 'deepseek_expert_mode';

    // 持久化函数
    function saveHistory() { localStorage.setItem(STORAGE_KEY_HISTORY, JSON.stringify(conversationHistory)); }
    function loadHistory() {
        const saved = localStorage.getItem(STORAGE_KEY_HISTORY);
        if (saved) try { conversationHistory = JSON.parse(saved); } catch(e) { conversationHistory = []; }
        else conversationHistory = [];
    }
    function saveModelPref() { localStorage.setItem(STORAGE_KEY_MODEL, currentModel); }
    function loadModelPref() {
        const saved = localStorage.getItem(STORAGE_KEY_MODEL);
        if (saved === 'deepseek-v4-flash' || saved === 'deepseek-v4-pro') currentModel = saved;
        else currentModel = 'deepseek-v4-flash';
        modelSelect.value = currentModel;
    }
    function saveTempPref() { localStorage.setItem(STORAGE_KEY_TEMP, currentTemperature.toString()); }
    function loadTempPref() {
        const saved = localStorage.getItem(STORAGE_KEY_TEMP);
        if (saved !== null) { let tmp = parseFloat(saved); if (!isNaN(tmp) && tmp>=0 && tmp<=2) currentTemperature = tmp; }
        else currentTemperature = 1.3;
        tempSlider.value = currentTemperature;
        tempValue.innerText = currentTemperature.toFixed(2);
    }
    function saveExpertPref() { localStorage.setItem(STORAGE_KEY_EXPERT, expertMode || 'none'); }
    function loadExpertPref() {
        const saved = localStorage.getItem(STORAGE_KEY_EXPERT);
        if (saved === 'roleplay') setExpertModeUI('roleplay');
        else if (saved === 'analysis') setExpertModeUI('analysis');
        else setExpertModeUI(null);
    }
    function setExpertModeUI(mode) {
        expertMode = mode;
        roleplayBtn.classList.remove('active');
        analysisBtn.classList.remove('active');
        if (mode === 'roleplay') roleplayBtn.classList.add('active');
        else if (mode === 'analysis') analysisBtn.classList.add('active');
        saveExpertPref();
        // 在聊天区域显示提示（但不要存历史）
        const hint = mode === 'roleplay' ? '🎭 已切换至“角色沉浸”模式，AI会尽情内心戏。' : (mode === 'analysis' ? '📐 已切换至“纯分析”模式，AI会冷静推演剧情。' : '✖️ 已关闭专家模式，恢复普通对话。');
        // 显示提示但不保存历史
        appendMessageToDOM('assistant', hint, new Date().toLocaleTimeString(), null, false);
    }

    // 渲染
    function appendMessageToDOM(role, content, timestamp, reasoning = null, saveToHistory = false) {
        // 此函数只负责显示，不处理历史存储（历史存储由addMessage统一处理）
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role}-message`;
        if (role === 'assistant' && reasoning) {
            const reasoningDiv = document.createElement('div');
            reasoningDiv.className = 'reasoning-block';
            const header = document.createElement('div');
            header.className = 'reasoning-header';
            const iconSpan = document.createElement('span');
            iconSpan.textContent = '▼';
            const titleSpan = document.createElement('span');
            titleSpan.textContent = '🧠 深度思考（思维链）';
            header.appendChild(iconSpan);
            header.appendChild(titleSpan);
            const contentDiv = document.createElement('div');
            contentDiv.className = 'reasoning-content';
            contentDiv.textContent = reasoning;
            contentDiv.style.display = 'block';
            reasoningDiv.appendChild(header);
            reasoningDiv.appendChild(contentDiv);
            messageDiv.appendChild(reasoningDiv);
            header.style.cursor = 'pointer';
            header.addEventListener('click', () => {
                const isVisible = contentDiv.style.display !== 'none';
                contentDiv.style.display = isVisible ? 'none' : 'block';
                iconSpan.textContent = isVisible ? '▶' : '▼';
            });
        }
        const bubbleDiv = document.createElement('div');
        bubbleDiv.className = 'bubble';
        bubbleDiv.innerText = content;
        const timeSpan = document.createElement('div');
        timeSpan.className = 'timestamp';
        timeSpan.innerText = timestamp;
        messageDiv.appendChild(bubbleDiv);
        messageDiv.appendChild(timeSpan);
        messagesArea.appendChild(messageDiv);
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function addMessage(role, content, saveToHistory = true, timestamp = null, reasoning = null) {
        const time = timestamp || new Date().toLocaleTimeString([], { hour: '2-digit', minute:'2-digit' });
        appendMessageToDOM(role, content, time, reasoning);
        if (saveToHistory) {
            conversationHistory.push({ role, content, timestamp: time, reasoning });
            saveHistory();
        }
    }

    function renderAllMessages() {
        messagesArea.innerHTML = '';
        for (const msg of conversationHistory) {
            appendMessageToDOM(msg.role, msg.content, msg.timestamp, msg.reasoning);
        }
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function showTypingIndicator() {
        const div = document.createElement('div');
        div.id = 'typingIndicator';
        div.className = 'message assistant-message';
        div.innerHTML = `<div class="bubble">🤖 ${currentModel === 'deepseek-v4-pro' ? 'V4-Pro 深度思考中...' : 'V4-Flash 处理中...'}</div>`;
        messagesArea.appendChild(div);
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }
    function removeTypingIndicator() { document.getElementById('typingIndicator')?.remove(); }

    function disableButtons(disabled) {
        sendBtn.disabled = disabled;
        saveKeyBtn.disabled = disabled;
        clearChatBtn.disabled = disabled;
        regenerateBtn.disabled = disabled;
        undoBtn.disabled = disabled;
    }

    // 核心发送逻辑：自动附加专家模式指令
    async function callDeepSeekV4(rawUserMessage) {
        if (!currentApiKey) {
            addMessage('assistant', '❌ 请先保存 API Key', false);
            return;
        }
        let finalMessage = rawUserMessage;
        // 根据专家模式自动附加指令（放在消息末尾，换行分隔）
        if (expertMode === 'roleplay') finalMessage = `${rawUserMessage}\n\n${ROLEPLAY_INSTRUCTION}`;
        else if (expertMode === 'analysis') finalMessage = `${rawUserMessage}\n\n${ANALYSIS_INSTRUCTION}`;
        
        addMessage('user', finalMessage, true);
        userInput.value = '';
        showTypingIndicator();
        disableButtons(true);

        const messagesForAPI = [
            { role: 'system', content: '你是一位专业角色扮演AI。' }
        ];
        for (const m of conversationHistory) {
            messagesForAPI.push({ role: m.role, content: m.content });
        }

        try {
            const resp = await fetch('https://api.deepseek.com/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${currentApiKey}` },
                body: JSON.stringify({
                    model: currentModel,
                    messages: messagesForAPI,
                    temperature: currentTemperature,
                    stream: false
                })
            });
            removeTypingIndicator();
            if (!resp.ok) {
                let errMsg = `HTTP ${resp.status}`;
                try { const errData = await resp.json(); errMsg = errData.error?.message || JSON.stringify(errData); } catch(e) {}
                throw new Error(errMsg);
            }
            const data = await resp.json();
            const reply = data.choices[0].message.content;
            const reasoning = data.choices[0].message.reasoning_content || null;
            addMessage('assistant', reply, true, null, reasoning);
        } catch (err) {
            removeTypingIndicator();
            addMessage('assistant', `⚠️ 调用失败：${err.message}`, false);
            conversationHistory.pop();
            saveHistory();
            const lastUserMsg = document.querySelectorAll('.user-message');
            if (lastUserMsg.length) lastUserMsg[lastUserMsg.length-1].remove();
        } finally {
            disableButtons(false);
            userInput.focus();
        }
    }

    async function regenerateLastReply() {
        if (!currentApiKey) { addMessage('assistant', '请先保存 API Key', false); return; }
        if (conversationHistory.length < 2) { addMessage('assistant', '没有足够的历史', false); return; }
        if (conversationHistory[conversationHistory.length-1].role !== 'assistant') { addMessage('assistant', '最后一条不是AI回复', false); return; }
        conversationHistory.pop();
        saveHistory();
        const lastAssistantDivs = document.querySelectorAll('.assistant-message');
        if (lastAssistantDivs.length) lastAssistantDivs[lastAssistantDivs.length-1].remove();
        const lastUserMsgObj = conversationHistory[conversationHistory.length-1];
        let lastUserRaw = lastUserMsgObj.content;
        // 注意：历史中存储的是已经附带指令的完整消息，重新生成时不能重复附加指令
        // 所以我们直接使用历史中的最后一条用户消息（已经包含指令）
        const messagesForAPI = [
            { role: 'system', content: '你是一位专业角色扮演AI。' }
        ];
        for (const m of conversationHistory) messagesForAPI.push({ role: m.role, content: m.content });
        showTypingIndicator();
        disableButtons(true);
        try {
            const resp = await fetch('https://api.deepseek.com/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${currentApiKey}` },
                body: JSON.stringify({ model: currentModel, messages: messagesForAPI, temperature: currentTemperature, stream: false })
            });
            removeTypingIndicator();
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const data = await resp.json();
            const newReply = data.choices[0].message.content;
            const newReasoning = data.choices[0].message.reasoning_content || null;
            addMessage('assistant', newReply, true, null, newReasoning);
        } catch (err) {
            removeTypingIndicator();
            addMessage('assistant', `重答失败：${err.message}`, false);
        } finally {
            disableButtons(false);
            userInput.focus();
        }
    }

    function undoLastUser() {
        let lastUserIdx = -1;
        for (let i=conversationHistory.length-1; i>=0; i--) {
            if (conversationHistory[i].role === 'user') { lastUserIdx=i; break; }
        }
        if (lastUserIdx === -1) { addMessage('assistant', '没有可撤回的消息', false); return; }
        conversationHistory = conversationHistory.slice(0, lastUserIdx);
        saveHistory();
        renderAllMessages();
        addMessage('assistant', '✅ 已撤回上一条输入及后续回复', false);
    }

    function saveApiKey() {
        const key = apiKeyInput.value.trim();
        if (key && key.startsWith('sk-')) {
            currentApiKey = key;
            localStorage.setItem(STORAGE_KEY_API, key);
            addMessage('assistant', '✅ API Key 已保存。现在可以使用下方专家模式按钮。', false);
            apiKeyInput.value = '';
        } else alert('请输入有效的 API Key (sk-开头)');
    }

    function newConversation() {
        conversationHistory = [];
        saveHistory();
        messagesArea.innerHTML = '';
        addMessage('assistant', '✨ 新对话已创建。点击上方按钮可随时切换专家模式。', false);
    }

    function loadInitialData() {
        const savedKey = localStorage.getItem(STORAGE_KEY_API);
        if (savedKey && savedKey.startsWith('sk-')) currentApiKey = savedKey;
        loadHistory();
        loadModelPref();
        loadTempPref();
        loadExpertPref();
        if (conversationHistory.length === 0) {
            addMessage('assistant', `🎭 DeepSeek-V4 专家模式已就绪。\n当前模型: ${currentModel === 'deepseek-v4-pro' ? 'V4-Pro' : 'V4-Flash'}\n可用专家模式：\n• 角色沉浸（内心戏）\n• 纯分析（导演视角）`, false);
        } else renderAllMessages();
        if (!currentApiKey) addMessage('assistant', '🔐 请在上方粘贴你的 DeepSeek API Key。', false);
    }

    // 事件绑定
    saveKeyBtn.addEventListener('click', saveApiKey);
    clearChatBtn.addEventListener('click', newConversation);
    regenerateBtn.addEventListener('click', regenerateLastReply);
    undoBtn.addEventListener('click', undoLastUser);
    sendBtn.addEventListener('click', () => { const q = userInput.value.trim(); if (q) callDeepSeekV4(q); });
    userInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); const q = userInput.value.trim(); if (q) callDeepSeekV4(q); } });
    modelSelect.addEventListener('change', (e) => { currentModel = e.target.value; saveModelPref(); addMessage('assistant', `⚙️ 模型切换至 ${currentModel === 'deepseek-v4-pro' ? 'V4-Pro (深度推理，优惠价输出6元/百万token)' : 'V4-Flash (经济输出2元/百万token)'}`, false); });
    tempSlider.addEventListener('input', (e) => { currentTemperature = parseFloat(e.target.value); tempValue.innerText = currentTemperature.toFixed(2); saveTempPref(); });
    roleplayBtn.addEventListener('click', () => setExpertModeUI('roleplay'));
    analysisBtn.addEventListener('click', () => setExpertModeUI('analysis'));
    normalBtn.addEventListener('click', () => setExpertModeUI(null));

    loadInitialData();
    userInput.focus();
</script>
</body>
</html>
