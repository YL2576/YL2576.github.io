<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DeepSeek 角色扮演助手</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background-color: #f4f7f9;
            margin: 0;
            padding: 20px;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            max-width: 800px;
            width: 100%;
            height: 90vh;
            background-color: white;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        /* 设置区域布局 */
        .settings-area {
            padding: 12px 15px;
            background-color: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            font-size: 13px;
        }
        .api-row {
            display: flex;
            flex: 2;
            gap: 8px;
            min-width: 200px;
        }
        #apiKeyInput {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 30px;
            font-size: 13px;
            outline: none;
        }
        .btn-small {
            background-color: #0f172a;
            color: white;
            border: none;
            padding: 0 16px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
            white-space: nowrap;
        }
        .btn-small:active { transform: scale(0.96); }
        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: #eef2ff;
            padding: 4px 12px;
            border-radius: 30px;
        }
        .control-group label {
            cursor: pointer;
            font-weight: 500;
        }
        select, input[type="range"] {
            cursor: pointer;
            background-color: white;
            border: 1px solid #cbd5e1;
            border-radius: 20px;
            padding: 4px 8px;
            font-size: 12px;
        }
        .temp-value {
            min-width: 40px;
            text-align: center;
            font-weight: bold;
        }
        .messages-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }
        .user-message {
            align-items: flex-end;
            align-self: flex-end;
        }
        .assistant-message {
            align-items: flex-start;
            align-self: flex-start;
        }
        .bubble {
            padding: 12px 18px;
            border-radius: 24px;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        .assistant-message .bubble {
            background-color: #f1f5f9;
            color: #0f172a;
            border-bottom-left-radius: 4px;
        }
        .user-message .bubble {
            background-color: #0f172a;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .timestamp {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 5px;
            margin-left: 12px;
            margin-right: 12px;
        }
        .input-area {
            padding: 15px;
            background-color: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        #userInput {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            font-size: 16px;
            outline: none;
            resize: none;
            font-family: inherit;
        }
        .input-buttons {
            display: flex;
            gap: 8px;
        }
        .icon-btn {
            background-color: #0f172a;
            color: white;
            border: none;
            width: 48px;
            border-radius: 40px;
            font-size: 18px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .icon-btn.special {
            background-color: #64748b;
            width: auto;
            padding: 0 16px;
            font-size: 14px;
        }
        .icon-btn.warning {
            background-color: #b91c1c;
        }
        .icon-btn:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }
        .loading {
            color: #64748b;
            font-style: italic;
            padding: 10px;
        }
        .model-badge {
            font-size: 11px;
            background-color: #e2e8f0;
            border-radius: 12px;
            padding: 2px 8px;
            margin-left: 8px;
        }
        @media (max-width: 600px) {
            .settings-area { flex-direction: column; align-items: stretch; }
            .control-group { justify-content: space-between; }
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="settings-area">
        <div class="api-row">
            <input type="password" id="apiKeyInput" placeholder="粘贴 DeepSeek API Key (sk-...)" autocomplete="off">
            <button id="saveKeyBtn" class="btn-small">保存 Key</button>
        </div>
        <div class="control-group">
            <span>🧠 思考模式</span>
            <input type="checkbox" id="reasonerCheckbox">
            <label for="reasonerCheckbox">开启 (deepseek-reasoner)</label>
        </div>
        <div class="control-group">
            <span>🌡️ Temperature</span>
            <input type="range" id="tempSlider" min="0" max="2" step="0.05" value="1.3">
            <span id="tempValue" class="temp-value">1.30</span>
        </div>
        <button id="clearChatBtn" class="btn-small">🗑️ 新对话</button>
    </div>
    <div class="messages-area" id="messagesArea"></div>
    <div class="input-area">
        <textarea id="userInput" rows="1" placeholder="输入角色扮演对话... (Enter发送, Shift+Enter换行)"></textarea>
        <div class="input-buttons">
            <button id="sendBtn" class="icon-btn">➤</button>
            <button id="undoBtn" class="icon-btn warning" title="撤回上一条输入">↩️</button>
            <button id="regenerateBtn" class="icon-btn special">🔄 重答</button>
        </div>
    </div>
</div>

<script>
    // DOM 元素
    const apiKeyInput = document.getElementById('apiKeyInput');
    const saveKeyBtn = document.getElementById('saveKeyBtn');
    const clearChatBtn = document.getElementById('clearChatBtn');
    const regenerateBtn = document.getElementById('regenerateBtn');
    const undoBtn = document.getElementById('undoBtn');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const messagesArea = document.getElementById('messagesArea');
    const reasonerCheckbox = document.getElementById('reasonerCheckbox');
    const tempSlider = document.getElementById('tempSlider');
    const tempValue = document.getElementById('tempValue');

    let currentApiKey = '';
    let conversationHistory = [];  // 存储 {role, content, timestamp}
    let useReasoner = false;       // 是否使用思考模式 (deepseek-reasoner)
    let temperature = 1.3;         // 默认角色扮演推荐

    // 存储键名
    const STORAGE_KEY_HISTORY = 'deepseek_rp_history_v5';
    const STORAGE_KEY_API = 'deepseek_api_key';
    const STORAGE_KEY_REASONER = 'deepseek_use_reasoner';
    const STORAGE_KEY_TEMP = 'deepseek_temperature';

    // ---- 持久化 ----
    function saveHistory() {
        localStorage.setItem(STORAGE_KEY_HISTORY, JSON.stringify(conversationHistory));
    }
    function loadHistory() {
        const saved = localStorage.getItem(STORAGE_KEY_HISTORY);
        if (saved) {
            try { conversationHistory = JSON.parse(saved); } catch(e) { conversationHistory = []; }
        } else { conversationHistory = []; }
    }
    function saveReasonerPref() {
        localStorage.setItem(STORAGE_KEY_REASONER, useReasoner ? 'true' : 'false');
    }
    function loadReasonerPref() {
        const saved = localStorage.getItem(STORAGE_KEY_REASONER);
        useReasoner = (saved === 'true');
        reasonerCheckbox.checked = useReasoner;
    }
    function saveTempPref() {
        localStorage.setItem(STORAGE_KEY_TEMP, temperature.toString());
    }
    function loadTempPref() {
        const saved = localStorage.getItem(STORAGE_KEY_TEMP);
        if (saved !== null) {
            temperature = parseFloat(saved);
            if (isNaN(temperature)) temperature = 1.3;
            temperature = Math.min(2, Math.max(0, temperature));
        } else {
            temperature = 1.3;
        }
        tempSlider.value = temperature;
        tempValue.innerText = temperature.toFixed(2);
    }

    // 获取当前模型
    function getCurrentModel() {
        return useReasoner ? 'deepseek-reasoner' : 'deepseek-chat';
    }

    // 渲染全部消息
    function renderAllMessages() {
        messagesArea.innerHTML = '';
        for (const msg of conversationHistory) {
            appendMessageToDOM(msg.role, msg.content, msg.timestamp);
        }
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function appendMessageToDOM(role, content, timestamp) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role}-message`;
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerText = content;
        const timeSpan = document.createElement('div');
        timeSpan.className = 'timestamp';
        timeSpan.innerText = timestamp;
        messageDiv.appendChild(bubble);
        messageDiv.appendChild(timeSpan);
        messagesArea.appendChild(messageDiv);
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function addMessage(role, content, saveToHistory = true, timestamp = null) {
        const time = timestamp || new Date().toLocaleTimeString([], { hour: '2-digit', minute:'2-digit' });
        appendMessageToDOM(role, content, time);
        if (saveToHistory) {
            conversationHistory.push({ role, content, timestamp: time });
            saveHistory();
        }
    }

    function showTypingIndicator() {
        const div = document.createElement('div');
        div.id = 'typingIndicator';
        div.className = 'message assistant-message';
        const modelName = useReasoner ? '深度思考模式' : '普通模式';
        div.innerHTML = `<div class="bubble loading">🤔 ${modelName} 思考中... (温度:${temperature.toFixed(2)})</div>`;
        messagesArea.appendChild(div);
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }
    function removeTypingIndicator() {
        const el = document.getElementById('typingIndicator');
        if (el) el.remove();
    }

    function disableButtons(disabled) {
        sendBtn.disabled = disabled;
        saveKeyBtn.disabled = disabled;
        clearChatBtn.disabled = disabled;
        regenerateBtn.disabled = disabled;
        undoBtn.disabled = disabled;
    }

    // 核心 API 调用
    async function callDeepSeekAPI(userQuestion) {
        if (!currentApiKey) {
            addMessage('assistant', '❌ 请先保存 API Key。', false);
            return;
        }
        addMessage('user', userQuestion, true);
        userInput.value = '';
        showTypingIndicator();
        disableButtons(true);

        const messagesForAPI = [
            { role: 'system', content: '你是一个专业的角色扮演AI助手，请根据对话历史扮演角色，保持性格一致，回答生动自然。' }
        ].concat(conversationHistory.map(m => ({ role: m.role, content: m.content })));

        const requestBody = {
            model: getCurrentModel(),
            messages: messagesForAPI,
            temperature: temperature,
            stream: false
        };

        try {
            const response = await fetch('https://api.deepseek.com/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${currentApiKey}`
                },
                body: JSON.stringify(requestBody)
            });
            removeTypingIndicator();
            if (!response.ok) {
                let errMsg = `HTTP ${response.status}`;
                try { const errData = await response.json(); errMsg = errData.error?.message || JSON.stringify(errData); } catch(e) {}
                throw new Error(errMsg);
            }
            const data = await response.json();
            const reply = data.choices[0].message.content;
            addMessage('assistant', reply, true);
        } catch (error) {
            removeTypingIndicator();
            addMessage('assistant', `😵 出错: ${error.message}`, false);
            // 回滚用户消息
            conversationHistory.pop();
            saveHistory();
            const userMessages = document.querySelectorAll('.user-message');
            if (userMessages.length > 0) userMessages[userMessages.length-1].remove();
        } finally {
            disableButtons(false);
            userInput.focus();
        }
    }

    // 重新生成最后一条AI回复
    async function regenerateLastReply() {
        if (!currentApiKey) {
            addMessage('assistant', '❌ 请先保存 API Key。', false);
            return;
        }
        if (conversationHistory.length < 2) {
            addMessage('assistant', '没有可以重新生成的消息。', false);
            return;
        }
        const lastMsg = conversationHistory[conversationHistory.length - 1];
        if (lastMsg.role !== 'assistant') {
            addMessage('assistant', '无法重新生成：最后一条不是AI回复。', false);
            return;
        }
        // 移除最后一条 assistant 回复
        conversationHistory.pop();
        saveHistory();
        const allAssistantMsgs = document.querySelectorAll('.assistant-message');
        if (allAssistantMsgs.length > 0) allAssistantMsgs[allAssistantMsgs.length-1].remove();

        // 重新请求
        const messagesForAPI = [
            { role: 'system', content: '你是一个专业的角色扮演AI助手，请根据对话历史扮演角色，保持性格一致，回答生动自然。' }
        ].concat(conversationHistory.map(m => ({ role: m.role, content: m.content })));

        showTypingIndicator();
        disableButtons(true);
        try {
            const response = await fetch('https://api.deepseek.com/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${currentApiKey}`
                },
                body: JSON.stringify({
                    model: getCurrentModel(),
                    messages: messagesForAPI,
                    temperature: temperature,
                    stream: false
                })
            });
            removeTypingIndicator();
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            const newReply = data.choices[0].message.content;
            addMessage('assistant', newReply, true);
        } catch (error) {
            removeTypingIndicator();
            addMessage('assistant', `重新生成失败: ${error.message}`, false);
        } finally {
            disableButtons(false);
            userInput.focus();
        }
    }

    // 撤回上一条输入（删除最后一条用户消息及其对应的AI回复）
    function undoLastUserInput() {
        // 历史记录至少有一条用户消息
        let lastUserIndex = -1;
        for (let i = conversationHistory.length - 1; i >= 0; i--) {
            if (conversationHistory[i].role === 'user') {
                lastUserIndex = i;
                break;
            }
        }
        if (lastUserIndex === -1) {
            addMessage('assistant', '没有可以撤回的消息。', false);
            return;
        }
        // 删除从 lastUserIndex 开始到最后的所有消息（用户+后续AI）
        const removed = conversationHistory.splice(lastUserIndex);
        saveHistory();
        // 重新渲染界面
        renderAllMessages();
        addMessage('assistant', `✅ 已撤回上一条输入及后续回复。`, false);
    }

    // 保存 API Key
    function saveApiKey() {
        const key = apiKeyInput.value.trim();
        if (key && key.startsWith('sk-')) {
            currentApiKey = key;
            localStorage.setItem(STORAGE_KEY_API, key);
            addMessage('assistant', '✅ API Key 已保存。\n💡 提示：可调节温度(0~2)控制创意性，开启思考模式处理复杂逻辑。', false);
            apiKeyInput.value = '';
        } else {
            alert('请输入有效的 API Key (以 sk- 开头)');
        }
    }

    // 新对话
    function newConversation() {
        conversationHistory = [];
        saveHistory();
        messagesArea.innerHTML = '';
        addMessage('assistant', '✨ 新对话开始！\n🌡️ 当前温度 = ' + temperature.toFixed(2) + ' (角色扮演推荐1.3)\n🧠 思考模式: ' + (useReasoner ? '开启' : '关闭'), false);
    }

    // 加载所有数据
    function loadSavedData() {
        const savedKey = localStorage.getItem(STORAGE_KEY_API);
        if (savedKey && savedKey.startsWith('sk-')) currentApiKey = savedKey;
        loadHistory();
        loadReasonerPref();
        loadTempPref();
        if (conversationHistory.length === 0) {
            addMessage('assistant', '🔮 角色扮演助手已就绪！\n\n你可以调节上方滑块改变「温度」：\n- 0.0 稳定/逻辑\n- 1.3 创意对话（推荐）\n- 1.5 天马行空\n\n开启思考模式会让回答更严谨，适合复杂推理。', false);
        } else {
            renderAllMessages();
        }
        if (!currentApiKey) {
            addMessage('assistant', '请先粘贴你的 DeepSeek API Key 并点击保存。', false);
        }
    }

    // 事件绑定
    saveKeyBtn.addEventListener('click', saveApiKey);
    clearChatBtn.addEventListener('click', newConversation);
    regenerateBtn.addEventListener('click', regenerateLastReply);
    undoBtn.addEventListener('click', undoLastUserInput);
    sendBtn.addEventListener('click', () => {
        const q = userInput.value.trim();
        if (q) callDeepSeekAPI(q);
    });
    userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            const q = userInput.value.trim();
            if (q) callDeepSeekAPI(q);
        }
    });

    // 温度滑块联动
    tempSlider.addEventListener('input', (e) => {
        temperature = parseFloat(e.target.value);
        tempValue.innerText = temperature.toFixed(2);
        saveTempPref();
        // 可选：提示温度已改变，不打扰对话
    });
    // 思考模式切换
    reasonerCheckbox.addEventListener('change', (e) => {
        useReasoner = e.target.checked;
        saveReasonerPref();
        addMessage('assistant', `🧠 思考模式已${useReasoner ? '开启' : '关闭'}，当前模型：${getCurrentModel()}`, false);
    });

    // 初始化
    loadSavedData();
    userInput.focus();
</script>
</body>
</html>
